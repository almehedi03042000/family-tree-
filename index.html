<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Family Tree</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
}

/* Toolbar */
#toolbar {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 1000;
  background: white;
  padding: 10px;
  border-radius: 8px;
  box-shadow: 0 0 10px #ccc;
}

#treeWrapper {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #f4f6f8;
  cursor: grab;
}

/* Tree container (zoom + drag target) */
#tree {
  position: absolute;
  transform-origin: 0 0;
}

/* Node box */
.node {
  display: inline-block;
  padding: 10px 15px;
  background: white;
  border: 2px solid #333;
  border-radius: 8px;
  text-align: center;
  min-width: 100px;
  position: relative;
}

/* Children layout */
.children {
  display: flex;
  justify-content: center;
  margin-top: 40px;
  gap: 40px;
  position: relative;
}

/* vertical line */
.node::after {
  content: "";
  position: absolute;
  width: 2px;
  height: 20px;
  background: #333;
  left: 50%;
  bottom: -20px;
}

/* horizontal connector */
.children::before {
  content: "";
  position: absolute;
  top: -20px;
  left: 50%;
  width: 2px;
  height: 20px;
  background: #333;
}

/* modal */
#modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.5);
}

#modalContent {
  background: white;
  padding: 20px;
  width: 300px;
  margin: 100px auto;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="toolbar">
  🔍 <input id="search" placeholder="নাম লিখুন">
  <button onclick="zoomIn()">+</button>
  <button onclick="zoomOut()">-</button>
</div>

<div id="treeWrapper">
  <div id="tree"></div>
</div>

<!-- Modal -->
<div id="modal" onclick="closeModal()">
  <div id="modalContent"></div>
</div>

<script>
// ---------------- DATA ----------------
const family = [
  { id: 1, name: "মহাতাব উদ্দিন", father: null },
  { id: 2, name: "মাশারা খাতুম", father: null },
  { id: 3, name: "মরিয়ম", father: 1 },
  { id: 4, name: "মেরিনা", father: 1 },
  { id: 5, name: "রায়ান", father: 3 },
  { id: 6, name: "রাফিন", father: 3 },
  { id: 7, name: "ফসিক", father: 4 },
  { id: 8, name: "সাবা", father: 4 }
];

// ---------------- TREE BUILD ----------------
function buildTree(data, parentId = null) {
  return data
    .filter(p => p.father === parentId)
    .map(p => ({
      ...p,
      children: buildTree(data, p.id)
    }));
}

// ---------------- RENDER ----------------
function renderTree(nodes) {
  const container = document.createElement("div");

  nodes.forEach(node => {
    const nodeDiv = document.createElement("div");
    nodeDiv.className = "node";
    nodeDiv.innerText = node.name;

    nodeDiv.onclick = () => showDetails(node);

    if (node.children.length > 0) {
      const childrenDiv = document.createElement("div");
      childrenDiv.className = "children";

      childrenDiv.appendChild(renderTree(node.children));
      nodeDiv.appendChild(childrenDiv);
    }

    container.appendChild(nodeDiv);
  });

  return container;
}

// ---------------- INIT ----------------
const treeData = buildTree(family);
const tree = document.getElementById("tree");
tree.appendChild(renderTree(treeData));

// ---------------- ZOOM ----------------
let scale = 1;

function zoomIn() {
  scale += 0.1;
  updateTransform();
}

function zoomOut() {
  scale -= 0.1;
  updateTransform();
}

function updateTransform() {
  tree.style.transform = `scale(${scale}) translate(${posX}px, ${posY}px)`;
}

// ---------------- DRAG ----------------
let isDragging = false;
let startX, startY;
let posX = 0, posY = 0;

document.getElementById("treeWrapper").addEventListener("mousedown", (e) => {
  isDragging = true;
  startX = e.clientX - posX;
  startY = e.clientY - posY;
});

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;
  posX = e.clientX - startX;
  posY = e.clientY - startY;
  updateTransform();
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

// ---------------- SEARCH ----------------
document.getElementById("search").addEventListener("input", function () {
  const val = this.value.toLowerCase();

  document.querySelectorAll(".node").forEach(node => {
    if (node.innerText.toLowerCase().includes(val)) {
      node.style.background = "yellow";
    } else {
      node.style.background = "white";
    }
  });
});

// ---------------- MODAL ----------------
function showDetails(node) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("modalContent").innerHTML = `
    <h3>${node.name}</h3>
    <p>ID: ${node.id}</p>
    <p>Father ID: ${node.father}</p>
  `;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
</html>
