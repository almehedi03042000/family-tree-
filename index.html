            font-weight: 700;
            color: #2d3748;

            align-items: center;

        /* Main Tree Viewport */

            padding: 25px 20px;

            justify-content: center;
            align-items: flex-start;

        /* Crisp Gapless Connector Lines */
        .tf-tree ul {
            padding-top: 20px;
            position: relative;
            display: flex;
            justify-content: center;
            margin: 0;
            padding-left: 0;
        }

        .tf-tree li {
            text-align: center;
            list-style-type: none;
            position: relative;
            padding: 20px 6px 0 6px;
        }

        .tf-tree li::before, .tf-tree li::after {
            content: '';
            position: absolute;
            top: 0;
            right: 50%;
            border-top: 2px solid #1e3d2f;
            width: 50%;
            height: 20px;
        }

        .tf-tree li::after {
            right: auto;
            left: 50%;
            border-left: 2px solid #1e3d2f;
        }

        .tf-tree li:only-child::after, .tf-tree li:only-child::before {
            display: none;
        }

        .tf-tree li:only-child {
            padding-top: 0;
        }

        .tf-tree li:first-child::before, .tf-tree li:last-child::after {
            border: none;
        }

        .tf-tree li:last-child::before {
            border-right: 2px solid #1e3d2f;
            border-radius: 0 4px 0 0;
        }

        .tf-tree li:first-child::after {
            border-radius: 4px 0 0 0;
        }

        .tf-tree ul ul::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            border-left: 2px solid #1e3d2f;
            width: 0;
            height: 20px;
        }

        .female-vertical-list {

            align-items: center;

            left: 50%;
            width: 2px;
            height: 100%;
            background-color: #d53f8c;
            z-index: 0;
        }

        .female-vertical-list .member-card {
            z-index: 1;
        }

            justify-content: center;
            align-items: center;
            border-radius: 6px;

        // Navigation History Stack
        let historyStack = [familyData];
        let currentRootNode = familyData;

        document.addEventListener('DOMContentLoaded', () => {
            renderCurrentTree();
            setupSearch();
            setupModalEvents();
            setupPannableZoomTree();

            // Previous Page Button Click
            document.getElementById('prevPageBtn').addEventListener('click', () => {
                if (historyStack.length > 1) {
                    historyStack.pop(); // Remove current
                    currentRootNode = historyStack[historyStack.length - 1];
                    renderCurrentTree();
                }
            });

            // Home Page Button Click
            document.getElementById('homeBtn').addEventListener('click', () => {
                historyStack = [familyData];
                currentRootNode = familyData;
                renderCurrentTree();
            });

            document.getElementById('openZoomTreeBox').addEventListener('click', () => {
                openZoomTreeModal();
            });
        });

        function toBanglaNumber(num) {
            const banglaDigits = ['০', '১', '২', '৩', '৪', '৫', '৬', '৭', '৮', '৯'];
            return num.toString().replace(/\d/g, digit => banglaDigits[digit]);
        }

        function getCardHTML(node) {
            const deceasedClass = node.isDeceased ? 'deceased' : '';
            const genderClass = node.gender === 'female' ? 'female' : 'male';
            const deceasedBadge = node.isDeceased ? '<span class="deceased-badge">(মৃত)</span>' : '';

            return `
                <div class="member-card ${genderClass} ${deceasedClass}" data-id="${node.id}" onclick="onCardClick('${node.id}')">
                    <div class="member-name-bn">${node.nameBn} ${deceasedBadge}</div>
                    <div class="member-name-en">${node.nameEn}</div>
                </div>
            `;
        }

        function renderNodeHTML(node, currentDepth = 0) {
            if (!node) return '';

            const hasChildren = node.children && node.children.length > 0;
            let linkBtn = '';

            if (hasChildren) {
                if (currentRootNode.id === "padmashi" && (node.id === "isu" || node.id === "kesu")) {
                    linkBtn = `<button class="sub-tree-link" onclick="navigateToSubTree('${node.id}', event)">
                        👉 ${node.nameBn}-এর শাখা
                    </button>`;
                } else if (currentRootNode.id !== "padmashi" && currentDepth >= 1) {
                    linkBtn = `<button class="sub-tree-link" onclick="navigateToSubTree('${node.id}', event)">
                        👉 ${node.nameBn}-এর শাখা
                    </button>`;
                }
            }

            let childrenHTML = '';
            let allowChildren = false;

            if (currentRootNode.id === "padmashi" && currentDepth < 2) {
                allowChildren = true;
            } else if (currentRootNode.id !== "padmashi" && currentDepth < 1) {
                allowChildren = true;
            }

            if (hasChildren && allowChildren) {
                const childNodes = node.children.map(child => renderNodeHTML(child, currentDepth + 1)).join('');
                childrenHTML = `<ul>${childNodes}</ul>`;
            }

            const deceasedClass = node.isDeceased ? 'deceased' : '';
            const genderClass = node.gender === 'female' ? 'female' : 'male';
            const deceasedBadge = node.isDeceased ? '<span class="deceased-badge">(মৃত)</span>' : '';

            return `
                <li>
                    <div class="member-card ${genderClass} ${deceasedClass}" data-id="${node.id}" onclick="onCardClick('${node.id}')">
                        <div class="member-name-bn">${node.nameBn} ${deceasedBadge}</div>
                        <div class="member-name-en">${node.nameEn}</div>
                        ${linkBtn}
                    </div>
                    ${childrenHTML}
                </li>
            `;
        }

        function renderCurrentTree() {
            const container = document.getElementById('treeContainer');
            const breadcrumb = document.getElementById('breadcrumbText');
            const prevBtn = document.getElementById('prevPageBtn');
            const homeBtn = document.getElementById('homeBtn');
            const overviewBox = document.getElementById('overviewCardContainer');

            if (currentRootNode.id === familyData.id) {
                breadcrumb.textContent = '📍 প্রথম পেজ: পদ্মাশী সর্দার, আকালি সর্দার, ইসু সর্দার ও কেসু সর্দার';
                prevBtn.style.display = 'none';
                homeBtn.style.display = 'none';
                overviewBox.style.display = 'flex';
            } else {
                breadcrumb.textContent = `📍 আলাদা শাখা পেজ: ${currentRootNode.nameBn} (${currentRootNode.nameEn})`;
                prevBtn.style.display = 'inline-flex';
                homeBtn.style.display = 'inline-flex';
                overviewBox.style.display = 'none';
            }

            container.innerHTML = `<div class="tf-tree"><ul>${renderNodeHTML(currentRootNode, 0)}</ul></div>`;
        }

        function navigateToSubTree(id, event) {
            if (event) event.stopPropagation();
            const targetNode = findMemberById(familyData, id);
            if (targetNode) {
                currentRootNode = targetNode;
                historyStack.push(targetNode);
                renderCurrentTree();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function onCardClick(id) {
            const memberObj = findMemberById(familyData, id);
            const parentObj = findParentById(familyData, id);
            if (memberObj) {
                showMemberDetailsModal(memberObj, parentObj ? `${parentObj.nameBn} (${parentObj.nameEn})` : 'মূল পিতা/পূর্বপুরুষ');
            }
        }

        function findMemberById(root, id) {
            if (root.id === id) return root;
            if (root.children) {
                for (let child of root.children) {
                    const found = findMemberById(child, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function findParentById(root, id) {
            if (root.children) {
                for (let child of root.children) {
                    if (child.id === id) return root;
                    const found = findParentById(child, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function showMemberDetailsModal(member, parentName = 'N/A') {
            const modal = document.getElementById('memberModal');
            document.getElementById('modalNameBn').textContent = member.nameBn;
            document.getElementById('modalNameEn').textContent = member.nameEn;
            
            document.getElementById('modalGender').textContent = member.gender === 'female' ? 'নারী (Female)' : 'পুরুষ (Male)';

            const badge = document.getElementById('modalStatusBadge');
            if (member.isDeceased) {
                badge.textContent = 'মৃত (Deceased)';
                badge.className = 'status-badge deceased';
            } else {
                badge.textContent = 'জীবিত (Alive)';
                badge.className = 'status-badge';
            }

            document.getElementById('modalParent').textContent = parentName;
            document.getElementById('modalGeneration').textContent = `${toBanglaNumber(member.generation || 1)}ম প্রজন্ম`;
            
            const childCount = member.children ? member.children.length : 0;
            document.getElementById('modalChildrenCount').textContent = `${toBanglaNumber(childCount)} জন`;

            modal.style.display = 'flex';
        }

        /* Highly Compact A4 Tree Layout: Female vertically nested */
        function renderHybridFullTree(node) {
            if (!node) return '';

            const hasChildren = node.children && node.children.length > 0;

            if (hasChildren) {
                const maleChildren = node.children.filter(c => c.gender !== 'female');
                const femaleChildren = node.children.filter(c => c.gender === 'female');

                let maleHTML = maleChildren.map(child => renderHybridFullTree(child)).join('');
                let femaleHTML = '';

                if (femaleChildren.length > 0) {
                    const femaleCards = femaleChildren.map(f => getCardHTML(f)).join('');
                    femaleHTML = `
                        <li>
                            <div class="female-vertical-list">
                                ${femaleCards}
                            </div>
                        </li>
                    `;
                }

                return `
                    <li>
                        ${getCardHTML(node)}
                        <ul>
                            ${maleHTML}
                            ${femaleHTML}
                        </ul>
                    </li>
                `;
            } else {
                return `
                    <li>
                        ${getCardHTML(node)}
                    </li>
                `;
            }
        }

        /* Pannable & Zoomable Canvas Controller */
        let zoomScale = 0.7;
        let pointX = 40;
        let pointY = 40;
        let startX = 0;
        let startY = 0;
        let isPanning = false;

        function openZoomTreeModal() {
            const zoomModal = document.getElementById('zoomModal');
            const zoomContent = document.getElementById('zoomContent');
            zoomContent.innerHTML = `<div class="tf-tree"><ul>${renderHybridFullTree(familyData)}</ul></div>`;
            zoomModal.style.display = 'flex';
            
            zoomScale = 0.7;
            pointX = 40;
            pointY = 40;
            updateTransform();
        }

        function updateTransform() {
            const zoomContent = document.getElementById('zoomContent');
            zoomContent.style.transform = `translate(${pointX}px, ${pointY}px) scale(${zoomScale})`;
        }

        function setupPannableZoomTree() {
            const zoomViewport = document.getElementById('zoomViewport');
            const zoomModal = document.getElementById('zoomModal');

            document.getElementById('zoomCloseBtn').addEventListener('click', () => {
                zoomModal.style.display = 'none';
            });

            document.getElementById('zoomInBtn').addEventListener('click', () => {
                zoomScale = Math.min(zoomScale + 0.15, 2.5);
                updateTransform();
            });

            document.getElementById('zoomOutBtn').addEventListener('click', () => {
                zoomScale = Math.max(zoomScale - 0.15, 0.2);
                updateTransform();
            });

            document.getElementById('zoomResetBtn').addEventListener('click', () => {
                zoomScale = 0.7;
                pointX = 40;
                pointY = 40;
                updateTransform();
            });

            const startPan = (e) => {
                isPanning = true;
                startX = (e.clientX || e.touches[0].clientX) - pointX;
                startY = (e.clientY || e.touches[0].clientY) - pointY;
            };

            const doPan = (e) => {
                if (!isPanning) return;
                e.preventDefault();
                pointX = (e.clientX || e.touches[0].clientX) - startX;
                pointY = (e.clientY || e.touches[0].clientY) - startY;
                updateTransform();
            };

            const stopPan = () => {
                isPanning = false;
            };

            zoomViewport.addEventListener('mousedown', startPan);
            window.addEventListener('mousemove', doPan);
            window.addEventListener('mouseup', stopPan);

            zoomViewport.addEventListener('touchstart', startPan, { passive: true });
            window.addEventListener('touchmove', doPan, { passive: false });
            window.addEventListener('touchend', stopPan);

            zoomViewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY < 0 ? 0.08 : -0.08;
                zoomScale = Math.min(Math.max(0.2, zoomScale + delta), 2.5);
                updateTransform();
            }, { passive: false });

            // PDF Download Action
            document.getElementById('downloadPdfBtn').addEventListener('click', () => {
                const element = document.getElementById('zoomContent');
                const opt = {
                    margin:       0.2,
                    filename:     'পদ্মাশী_সর্দারের_বংশধারা.pdf',
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2 },
                    jsPDF:        { unit: 'in', format: 'a2', orientation: 'landscape' }
                };
                html2pdf().set(opt).from(element).save();
            });
        }

        /* Bilingual Search Implementation */
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const searchResults = document.getElementById('searchResults');

            const performSearch = () => {
                const query = searchInput.value.trim().toLowerCase();
                searchResults.innerHTML = '';
                
                if (!query) {
                    searchResults.style.display = 'none';
                    return;
                }

                const matches = [];
                searchMembersRecursive(familyData, query, matches);

                if (matches.length > 0) {
                    searchResults.style.display = 'block';
                    matches.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'search-result-item';
                        div.innerHTML = `<strong>${item.nameBn}</strong> <span style="opacity: 0.8; font-size: 0.78rem;">(${item.nameEn})</span>`;
                        div.addEventListener('click', () => {
                            const parent = findParentById(familyData, item.id);
                            if (parent && parent.children && parent.children.length > 0) {
                                currentRootNode = parent;
                                historyStack.push(parent);
                            } else {
                                currentRootNode = item;
                                historyStack.push(item);
                            }
                            renderCurrentTree();

                            setTimeout(() => {
                                highlightAndFocusMember(item.id);
                            }, 100);

                            searchResults.style.display = 'none';
                            searchInput.value = '';
                        });
                        searchResults.appendChild(div);
                    });
                } else {
                    searchResults.style.display = 'block';
                    searchResults.innerHTML = '<div class="search-result-item">কোনো সদস্য পাওয়া যায়নি / No member found</div>';
                }
            };

            searchInput.addEventListener('input', performSearch);
            searchBtn.addEventListener('click', performSearch);

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-box')) {
                    searchResults.style.display = 'none';
                }
            });
        }

        function searchMembersRecursive(node, query, results) {
            if (!node) return;
            const matchBn = node.nameBn.toLowerCase().includes(query);
            const matchEn = node.nameEn.toLowerCase().includes(query);
            
            if (matchBn || matchEn) {
                results.push(node);
            }
            if (node.children) {
                node.children.forEach(child => searchMembersRecursive(child, query, results));
            }
        }

        function highlightAndFocusMember(id) {
            document.querySelectorAll('.member-card').forEach(c => c.classList.remove('member-highlight'));
            const targetCard = document.querySelector(`.member-card[data-id="${id}"]`);
            if (targetCard) {
                targetCard.classList.add('member-highlight');
            }
        }

        function setupModalEvents() {
            const modal = document.getElementById('memberModal');
            document.getElementById('modalClose').addEventListener('click', () => {
                modal.style.display = 'none';
            });

            window.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });
        }
    </script>
</body>
