        .search-box input {

        }
        .search-box button {
            padding: 7px 14px; background: linear-gradient(135deg, #38a169, #2f855a); color: white;

        }
        .search-results-dropdown {
            position: absolute; top: 110%; left: 0; right: 0; background: linear-gradient(180deg, #1e3d2f 0%, #152e22 100%);
            border: 1px solid #38a169; border-radius: 8px; max-height: 220px; overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25); display: none; z-index: 101;
        }
        .search-result-item { padding: 8px 12px; cursor: pointer; font-size: 0.85rem; color: #f7fafc; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .search-result-item:hover { background-color: rgba(56, 161, 105, 0.3); }

        .overview-card-container { padding: 15px 20px 0 20px; display: flex; justify-content: center; }
        .overview-box {
            background: linear-gradient(135deg, #1e3d2f 0%, #2b6cb0 100%); color: white; padding: 12px 24px;
            border-radius: 10px; display: flex; flex-direction: column; align-items: center; width: 100%;
            max-width: 450px; box-shadow: 0 6px 18px rgba(43, 108, 176, 0.25); cursor: pointer; text-align: center; border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .overview-box h3 { font-size: 1.1rem; font-weight: 700; }
        .overview-box .click-subtext { font-size: 0.78rem; color: #e2e8f0; margin-top: 2px; }

        .nav-banner {
            background: #ffffff; padding: 10px 24px; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid #e2e8f0; margin-top: 15px; flex-wrap: wrap; gap: 10px;
        }
        .breadcrumb { font-size: 0.9rem; font-weight: 700; color: #2d3748; }
        .nav-buttons-group { display: flex; align-items: center; gap: 8px; }
        .nav-action-btn {
            background: #edf2f7; color: #2d3748; border: 1px solid #cbd5e0; padding: 5px 12px;
            border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.8rem; font-weight: 600;
        }
        .nav-action-btn.home-btn { background: #319795; color: white; border: none; }

        .tree-viewport { flex: 1; padding: 25px 15px; display: flex; justify-content: center; overflow-x: auto; }

        /* Compact Tree CSS Architecture */
        .tf-tree ul { padding-top: 15px; position: relative; display: flex; justify-content: center; margin: 0; padding-left: 0; }
        .tf-tree li { text-align: center; list-style-type: none; position: relative; padding: 15px 4px 0 4px; }
        .tf-tree li::before, .tf-tree li::after {
            content: ''; position: absolute; top: 0; right: 50%; border-top: 2px solid #1e3d2f; width: 50%; height: 15px;
        }
        .tf-tree li::after { right: auto; left: 50%; border-left: 2px solid #1e3d2f; }
        .tf-tree li:only-child::after, .tf-tree li:only-child::before { display: none; }
        .tf-tree li:only-child { padding-top: 0; }
        .tf-tree li:first-child::before, .tf-tree li:last-child::after { border: none; }
        .tf-tree li:last-child::before { border-right: 2px solid #1e3d2f; border-radius: 0 4px 0 0; }
        .tf-tree li:first-child::after { border-radius: 4px 0 0 0; }
        .tf-tree ul ul::before {
            content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid #1e3d2f; width: 0; height: 15px;
        }

        .member-card {
            padding: 10px 14px; display: inline-flex; flex-direction: column; justify-content: center;

        .member-card.deceased { border-color: #718096 !important; background-color: #edf2f7 !important; color: #4a5568 !important; }

        .deceased-badge { font-size: 0.65rem; color: #e53e3e; }

        .zoom-close-btn { background: #e53e3e; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
        
        .zoom-viewport { flex: 1; overflow: hidden; position: relative; cursor: grab; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); display: flex; justify-content: center; align-items: center; }

        function getCardHTML(node) {
            const deceasedClass = node.isDeceased ? 'deceased' : '';
            const genderClass = node.gender === 'female' ? 'female' : 'male';
            const deceasedBadge = node.isDeceased ? '<span class="deceased-badge">(মৃত)</span>' : '';

            return `
                <div class="member-card ${genderClass} ${deceasedClass}" onclick="onCardClick('${node.id}')">
                    <div class="member-name-bn">${node.nameBn} ${deceasedBadge}</div>
                </div>
            `;
        }

        // মূল হোম পেজ বা ধাপে ধাপে নেভিগেশনের রেন্ডারিং লজিক:
        // বর্তমান নোডের ঠিক পরবর্তী জেনারেশন (সন্তানরা) রেন্ডার হবে এবং তাদের নিচে ক্লিক করার বাটন থাকবে।
        function renderNodeHTML(node) {
            if (!node) return '';

            let childrenHTML = '';
            if (node.children && node.children.length > 0) {
                const childNodesHTML = node.children.map(child => {
                    const hasGrandChildren = child.children && child.children.length > 0;
                    let linkBtn = '';
                    
                    // যার সন্তান বা পরবর্তী প্রজন্ম আছে, শুধুমাত্র তাদের বক্সের নিচেই এই অপশন থাকবে
                    if (hasGrandChildren) {
                        linkBtn = `<button class="sub-tree-link" onclick="navigateToSubTree('${child.id}', event)">
                            👉 ${child.nameBn}-এর বংশধারা দেখতে ক্লিক করুন
                        </button>`;
                    }

                    const deceasedClass = child.isDeceased ? 'deceased' : '';
                    const genderClass = child.gender === 'female' ? 'female' : 'male';
                    const deceasedBadge = child.isDeceased ? '<span class="deceased-badge">(মৃত)</span>' : '';

                    return `
                        <li>
                            <div class="member-card ${genderClass} ${deceasedClass}" onclick="onCardClick('${child.id}')">
                                <div class="member-name-bn">${child.nameBn} ${deceasedBadge}</div>
                                ${linkBtn}
                            </div>
                        </li>
                    `;
                }).join('');

                childrenHTML = `<ul>${childNodesHTML}</ul>`;
            }

            const deceasedClass = node.isDeceased ? 'deceased' : '';
            const genderClass = node.gender === 'female' ? 'female' : 'male';
            const deceasedBadge = node.isDeceased ? '<span class="deceased-badge">(মৃত)</span>' : '';

            return `
                <li>
                    <div class="member-card ${genderClass} ${deceasedClass}" onclick="onCardClick('${node.id}')" style="border-width: 3px;">
                        <div class="member-name-bn" style="font-size: 1rem;">👑 প্রধান/পিতা: ${node.nameBn} ${deceasedBadge}</div>
                    </div>
                    ${childrenHTML}
                </li>
            `;
        }

        function renderCurrentTree() {
            const container = document.getElementById('treeContainer');
            const breadcrumb = document.getElementById('breadcrumbText');
            const prevBtn = document.getElementById('prevPageBtn');
            const homeBtn = document.getElementById('homeBtn');

            if (currentRootNode.id === familyData.id) {
                breadcrumb.textContent = '📍 মূল পেজ: পদ্মাশী সর্দার ➔ আকালী সর্দার ➔ ঈসু ও কেসু সর্দার';
                prevBtn.style.display = 'none';
                homeBtn.style.display = 'none';
            } else {
                breadcrumb.textContent = `📍 শাখা পেজ: ${currentRootNode.nameBn}-এর বংশধরগণ`;
                prevBtn.style.display = 'inline-flex';
                homeBtn.style.display = 'inline-flex';
            }

            container.innerHTML = `<div class="tf-tree"><ul>${renderNodeHTML(currentRootNode)}</ul></div>`;
        }

        function navigateToSubTree(id, event) {
            if (event) event.stopPropagation();
            const targetNode = findMemberById(familyData, id);
            if (targetNode) {
                currentRootNode = targetNode;
                historyStack.push(targetNode);
                renderCurrentTree();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function onCardClick(id) {
            const memberObj = findMemberById(familyData, id);
            const parentObj = findParentById(familyData, id);
            if (memberObj) {
                showMemberDetailsModal(memberObj, parentObj ? parentObj.nameBn : 'মূল পূর্বপুরুষ');
            }
        }

        function findMemberById(root, id) {
            if (root.id === id) return root;
            if (root.children) {
                for (let child of root.children) {
                    const found = findMemberById(child, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function findParentById(root, id) {
            if (root.children) {
                for (let child of root.children) {
                    if (child.id === id) return root;
                    const found = findParentById(child, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function showMemberDetailsModal(member, parentName = 'N/A') {
            const modal = document.getElementById('memberModal');
            document.getElementById('modalNameBn').textContent = member.nameBn;

            const badge = document.getElementById('modalStatusBadge');
            badge.textContent = member.isDeceased ? 'মৃত' : 'জীবিত';
            badge.className = member.isDeceased ? 'status-badge deceased' : 'status-badge';

            document.getElementById('modalGender').textContent = member.gender === 'female' ? 'নারী' : 'পুরুষ';
            document.getElementById('modalParent').textContent = parentName;
            document.getElementById('modalChildrenCount').textContent = `${member.children ? member.children.length : 0} জন`;

            modal.style.display = 'flex';
        }

        function renderFullTreeModal(node) {
            if (!node) return '';
            if (node.children && node.children.length > 0) {
                const childItems = node.children.map(child => renderFullTreeModal(child)).join('');
                return `<li>${getCardHTML(node)}<ul>${childItems}</ul></li>`;
            } else {
                return `<li>${getCardHTML(node)}</li>`;
            }
        }

        let zoomScale = 0.25;
        let pointX = 0;
        let pointY = 0;
        let startX = 0;
        let startY = 0;
        let isPanning = false;

        function openZoomTreeModal() {
            const zoomModal = document.getElementById('zoomModal');
            const zoomContent = document.getElementById('zoomContent');
            zoomContent.innerHTML = `<div class="tf-tree"><ul>${renderFullTreeModal(familyData)}</ul></div>`;
            zoomModal.style.display = 'flex';
            
            const viewport = document.getElementById('zoomViewport');
            zoomScale = 0.25; 
            pointX = (viewport.clientWidth - zoomContent.offsetWidth * zoomScale) / 2;
            pointY = 20;
            updateTransform();
        }

        function updateTransform() {
            const zoomContent = document.getElementById('zoomContent');
            zoomContent.style.transform = `translate(${pointX}px, ${pointY}px) scale(${zoomScale})`;
        }

        function setupPannableZoomTree() {
            const zoomViewport = document.getElementById('zoomViewport');
            const zoomModal = document.getElementById('zoomModal');

            document.getElementById('zoomCloseBtn').addEventListener('click', () => zoomModal.style.display = 'none');
            document.getElementById('zoomInBtn').addEventListener('click', () => { zoomScale = Math.min(zoomScale + 0.1, 2.0); updateTransform(); });
            document.getElementById('zoomOutBtn').addEventListener('click', () => { zoomScale = Math.max(zoomScale - 0.05, 0.1); updateTransform(); });
            document.getElementById('zoomResetBtn').addEventListener('click', () => { 
                zoomScale = 0.25; 
                pointX = (zoomViewport.clientWidth - document.getElementById('zoomContent').offsetWidth * zoomScale) / 2;
                pointY = 20; 
                updateTransform(); 
            });

            const startPan = (e) => {
                isPanning = true;
                startX = (e.clientX || e.touches[0].clientX) - pointX;
                startY = (e.clientY || e.touches[0].clientY) - pointY;
            };

            const doPan = (e) => {
                if (!isPanning) return;
                e.preventDefault();
                pointX = (e.clientX || e.touches[0].clientX) - startX;
                pointY = (e.clientY || e.touches[0].clientY) - startY;
                updateTransform();
            };

            const stopPan = () => isPanning = false;

            zoomViewport.addEventListener('mousedown', startPan);
            window.addEventListener('mousemove', doPan);
            window.addEventListener('mouseup', stopPan);

            zoomViewport.addEventListener('touchstart', startPan, { passive: true });
            window.addEventListener('touchmove', doPan, { passive: false });
            window.addEventListener('touchend', stopPan);

            document.getElementById('downloadPdfBtn').addEventListener('click', () => {
                const element = document.getElementById('zoomContent');
                const opt = {
                    margin: 0.2,
                    filename: 'পদ্মাশী_সর্দারের_সম্পূর্ণ_বংশধারা.pdf',
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'in', format: 'a3', orientation: 'landscape' }
                };
                html2pdf().set(opt).from(element).save();
            });
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const searchResults = document.getElementById('searchResults');

            const performSearch = () => {
                const query = searchInput.value.trim().toLowerCase();
                searchResults.innerHTML = '';
                if (!query) { searchResults.style.display = 'none'; return; }

                const matches = [];
                searchMembersRecursive(familyData, query, matches);

                if (matches.length > 0) {
                    searchResults.style.display = 'block';
                    matches.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'search-result-item';
                        div.innerHTML = `<strong>${item.nameBn}</strong>`;
                        div.addEventListener('click', () => {
                            currentRootNode = item;
                            historyStack.push(item);
                            renderCurrentTree();
                            searchResults.style.display = 'none';
                            searchInput.value = '';
                        });
                        searchResults.appendChild(div);
                    });
                } else {
                    searchResults.style.display = 'block';
                    searchResults.innerHTML = '<div class="search-result-item">কোনো সদস্য পাওয়া যায়নি</div>';
                }
            };

            searchInput.addEventListener('input', performSearch);
            searchBtn.addEventListener('click', performSearch);
        }

        function searchMembersRecursive(node, query, results) {
            if (!node) return;
            if (node.nameBn.toLowerCase().includes(query)) {
                results.push(node);
            }
            if (node.children) {
                node.children.forEach(child => searchMembersRecursive(child, query, results));
            }
        }

        function setupModalEvents() {
            const modal = document.getElementById('memberModal');
            document.getElementById('modalClose').addEventListener('click', () => modal.style.display = 'none');
            window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
        }
    </script>
</body>
</html>
