<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শেকড় - পদ্মাশী সর্দারের বংশধারা</title>
    <!-- Google Fonts for Bengali -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalpurush&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header & Search Controls Bar -->
    <header class="app-header">
        <div class="header-left">
            <h1>🌳 শেকড়</h1>
            <p class="subtitle">পদ্মাশী সর্দারের বংশধারা</p>
        </div>
        
        <div class="header-controls">
            <!-- Search Box -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="সদস্যের নাম খুঁজুন..." autocomplete="off">
                <button id="searchBtn">খুঁজুন</button>
                <div id="searchResults" class="search-results-dropdown"></div>
            </div>

            <!-- Zoom & View Controls -->
            <div class="zoom-controls">
                <button id="zoomInBtn" title="জুম ইন">+</button>
                <button id="zoomOutBtn" title="জুম আউট">-</button>
                <button id="resetZoomBtn" title="রিসেট">↺</button>
            </div>
        </div>
    </header>

    <!-- Main Tree Canvas Viewport -->
    <main class="tree-viewport" id="treeViewport">
        <div class="tree-container" id="treeContainer">
            <!-- Dynamic SVG Connection Lines Will Be Drawn Here -->
            <svg id="svgLines" class="svg-lines"></svg>
            <!-- Dynamic Tree Nodes Will Be Rendered Here -->
            <div id="treeNodes" class="tree-nodes"></div>
        </div>
    </main>

    <!-- Member Details Modal -->
    <div id="memberModal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <div class="modal-header">
                <h2 id="modalName">সদস্যের নাম</h2>
                <span id="modalStatusBadge" class="status-badge">জীবিত</span>
            </div>
            <div class="modal-body">
                <p><strong>পিতা/পূর্বপুরুষ:</strong> <span id="modalParent">N/A</span></p>
                <p><strong>বংশানুক্রমিক অবস্থান:</strong> <span id="modalGeneration">N/A</span></p>
                <p><strong>সন্তানাদি:</strong> <span id="modalChildrenCount">০ জন</span></p>
            </div>
        </div>
    </div>

    <!-- Load Scripts in exact Order -->
    <script src="data.js"></script>
    <script src="tree.js"></script>
    <script src="app.js"></script>
</body>
</html>
