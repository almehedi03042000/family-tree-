<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sardar Family Tree</title>

    <meta name="description" content="Sardar Family Tree Website">

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="logo">
            🌳 Sardar Family Tree
        </div>

        <div class="header-actions">

            <input
                type="text"
                id="searchBox"
                placeholder="সদস্যের নাম লিখুন...">

            <button id="darkModeBtn">
                🌙
            </button>

        </div>

    </header>

    <!-- ================= MAIN ================= -->

    <main>

        <!-- Toolbar -->

        <section class="toolbar">

            <button id="zoomIn">＋</button>

            <button id="zoomOut">－</button>

            <button id="resetZoom">Reset</button>

        </section>

        <!-- Family Tree -->

        <section id="treeContainer">

            <div class="welcome-card">

                <h1>
                    Sardar Family Tree
                </h1>

                <p>

                    Family Tree Loading...

                </p>

            </div>

        </section>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer>

        © 2026 Sardar Family Tree

    </footer>

    <script src="assets/js/app.js"></script>

</body>

</html>
</html>
