<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>সর্দার পরিবারের বংশবৃক্ষ</title>

    <meta name="description" content="Sardar Family Tree Website">

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- Header -->
    <header class="header">

        <div class="logo">
            🌳 সর্দার পরিবারের বংশবৃক্ষ
        </div>

        <div class="header-tools">

            <input
                id="searchBox"
                type="text"
                placeholder="সদস্যের নাম লিখুন...">

            <button id="darkModeBtn" title="Dark Mode">
                🌙
            </button>

        </div>

    </header>

    <!-- Hero -->

    <section class="hero">

        <h1>সর্দার পরিবারের বংশবৃক্ষ</h1>

        <p>

            প্রতিষ্ঠাতা : <strong>পদ্মাশী সর্দার</strong>

        </p>

    </section>

    <!-- Toolbar -->

    <section class="toolbar">

        <button id="zoomIn">＋</button>

        <button id="zoomOut">－</button>

        <button id="resetZoom">Reset</button>

    </section>

    <!-- Tree -->

    <main>

        <div id="treeContainer">

            <div class="loading">

                Family Tree Loading...

            </div>

        </div>

    </main>

    <!-- Footer -->

    <footer>

        © 2026 Sardar Family Tree

    </footer>
<script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>

</body>

</html>
